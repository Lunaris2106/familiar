<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이마젠 매니저</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (브라우저에서 JSX 변환) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 슬라이더 트랙 */
        .custom-slider {
            background: var(--track-bg, #e5e5e5) !important;
            -webkit-appearance: none;
        }
        .custom-slider:focus { outline: none; }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--thumb-color, #a3a3a3) !important;
            border: 2px solid #ffffff;
            transition: transform 0.1s ease;
            margin-top: -6px; /* 트랙 높이 맞춤 */
        }
        .dark .custom-slider::-webkit-slider-thumb { border-color: #000000; }
        .custom-slider::-webkit-slider-runnable-track { height: 4px; }
        .custom-slider::-webkit-slider-thumb:active { transform: scale(1.25); }

        /* 다크모드/유틸리티 커스텀 */
        .text-xxs { font-size: 0.65rem; }
        .active\:scale-98:active { transform: scale(0.98); }

        /* 모바일 전용 애니메이션 */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slideUp { animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
        
        /* 모바일에서 텍스트 드래그 방지 */
        body { -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-white dark:bg-black transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const YOUR_APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzJC9fhOddcoOgYesXhA7SLyMP9qzaa1rZ_h_rE016B0CvAcdZCHB9PyscuAtKRPhA/exec";

        // 아이콘 SVG 컴포넌트
        const Sun = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Moon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const Sparkles = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const Sliders = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>;
        const Plus = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const X = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const Trash2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const Save = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const Check = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const Loader2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

        const STAGES = [
          "X",
          "일반 0", "일반 1", "일반 2", "일반 3", "일반 4", "일반 5", "일반 6", "일반 7", "일반 8", "일반 9", "일반 10",
          "초월 1", "초월 2", "초월 3", "초월 4", "초월 5", "초월 6", "초월 7", "초월 8", "초월 9", "초월 10",
          "초극 1", "초극 2", "초극 3", "초극 4", "초극 5", "초극 6", "초극 7", "초극 8", "초극 9", "초극 10"
        ];

        const COSTS = [
          1, 1, 1, 1, 1, 1, 1, 2, 2, 2, 3, // 일반
          1, 1, 1, 1, 1, 1, 2, 2, 2, 3,    // 초월
          1, 1, 2, 2, 2, 2, 3, 3, 3, 4, 0  // 초극
        ];

        const ATTRIBUTE_ORDER = ["불", "물", "나무", "빛", "어둠"];

        const calculateCost = (startIdx, endIdx) => {
          let cost = 0;
          for (let i = startIdx; i < endIdx; i++) cost += COSTS[i];
          return cost;
        };

        const getStageStyleInfo = (stageIdx) => {
          const name = STAGES[stageIdx];
          if (name.includes("초극")) return { color: "text-red-600 dark:text-red-500", accent: "#dc2626" };
          if (name.includes("초월")) return { color: "text-purple-600 dark:text-purple-500", accent: "#9333ea" };
          if (name.includes("일반")) return { color: "text-blue-600 dark:text-blue-500", accent: "#2563eb" };
          return { color: "text-gray-500 dark:text-gray-400", accent: "#737373" };
        };

        function App() {
          const [loading, setLoading] = React.useState(true);
          const [error, setError] = React.useState('');
          const [activeTab, setActiveTab] = React.useState('my');
          const [darkMode, setDarkMode] = React.useState(() => localStorage.getItem('theme') === 'dark');

          const [familiarData, setFamiliarData] = React.useState({});
          const [metadata, setMetadata] = React.useState([]);
          
          const [myFamiliars, setMyFamiliars] = React.useState(() => JSON.parse(localStorage.getItem('MY_FAMILIARS')) || {});
          const [projects, setProjects] = React.useState(() => JSON.parse(localStorage.getItem('CALC_PROJECTS')) || []);
          const [totalEggs, setTotalEggs] = React.useState(() => parseInt(localStorage.getItem('TOTAL_EGGS')) || 0);
          const [trackers, setTrackers] = React.useState(() => JSON.parse(localStorage.getItem('TRACKERS')) || []);
          
          const [showAddModal, setShowAddModal] = React.useState(false);
          const [showProjectsModal, setShowProjectsModal] = React.useState(false);
          // 단계 설정 모달 상태 추가
          const [selectedFamiliarForStage, setSelectedFamiliarForStage] = React.useState(null);

          React.useEffect(() => {
            const root = window.document.documentElement;
            if (darkMode) {
              root.classList.add('dark');
              localStorage.setItem('theme', 'dark');
            } else {
              root.classList.remove('dark');
              localStorage.setItem('theme', 'light');
            }
          }, [darkMode]);

          React.useEffect(() => { localStorage.setItem('MY_FAMILIARS', JSON.stringify(myFamiliars)); }, [myFamiliars]);
          React.useEffect(() => { localStorage.setItem('CALC_PROJECTS', JSON.stringify(projects)); }, [projects]);
          React.useEffect(() => { localStorage.setItem('TOTAL_EGGS', totalEggs.toString()); }, [totalEggs]);
          React.useEffect(() => { localStorage.setItem('TRACKERS', JSON.stringify(trackers)); }, [trackers]);

          React.useEffect(() => {
            fetchData(YOUR_APPSCRIPT_URL);
          }, []);

          const fetchData = async (url) => {
            try {
              if (url === "여기에_URL을_입력하세요") throw new Error("코드 상단의 YOUR_APPSCRIPT_URL에 앱스크립트 주소를 넣어주세요.");
              const response = await fetch(url, { method: 'POST', body: JSON.stringify({ action: 'get_metadata' }) });
              const data = await response.json();
              if (data.status === 'success' && data.familiar_data) {
                const grouped = {};
                data.familiar_data.forEach(item => {
                  if (!grouped[item.familiar]) grouped[item.familiar] = {};
                  grouped[item.familiar][item.power] = item.url;
                });
                setFamiliarData(grouped);
                setMetadata(data.metadata || []);
              } else {
                throw new Error('데이터 구조가 올바르지 않습니다.');
              }
            } catch (err) {
              setError('데이터를 불러오지 못했습니다: ' + err.message);
            } finally {
              setLoading(false);
            }
          };

          const familiarsByAttribute = React.useMemo(() => {
            const grouped = {};
            ATTRIBUTE_ORDER.forEach(attr => grouped[attr] = []);
            metadata.forEach(item => {
              if (item.category?.toLowerCase() === 'familiar' || item.category === '이마젠') {
                const attr = item.attribute || '기타';
                if (!grouped[attr]) grouped[attr] = [];
                grouped[attr].push(item.item_name);
              }
            });
            return grouped;
          }, [metadata]);

          const remainingEggs = React.useMemo(() => {
            const usedEggs = trackers.reduce((acc, t) => acc + calculateCost(t.baseStage, t.targetStage), 0);
            return totalEggs - usedEggs;
          }, [totalEggs, trackers]);

          const addTracker = (name) => {
            if (trackers.some(t => t.name === name)) { setShowAddModal(false); return; }
            const base = myFamiliars[name] || 0;
            setTrackers([...trackers, { id: Date.now().toString() + Math.random(), name, baseStage: base, targetStage: base }]);
            setShowAddModal(false);
          };

          const handleSliderChange = (id, val) => {
            const tracker = trackers.find(t => t.id === id);
            if (!tracker) return;
            let target = parseInt(val);
            if (target < tracker.baseStage) target = tracker.baseStage;

            const costDiff = calculateCost(tracker.baseStage, target) - calculateCost(tracker.baseStage, tracker.targetStage);
            if (costDiff > remainingEggs) {
              let maxAffordable = tracker.targetStage;
              let tempRemaining = remainingEggs;
              for (let i = tracker.targetStage; i < target; i++) {
                if (tempRemaining >= COSTS[i]) { tempRemaining -= COSTS[i]; maxAffordable = i + 1; } 
                else break;
              }
              target = maxAffordable;
            }

            if (target !== tracker.targetStage) {
              if (navigator.vibrate) navigator.vibrate(10); 
              setTrackers(trackers.map(t => t.id === id ? { ...t, targetStage: target } : t));
            }
          };

          const getImageUrl = (name, stageIdx) => {
            const stageName = STAGES[stageIdx];
            let power = "X";
            if (stageName.includes("초극")) power = "초극";
            else if (stageName.includes("초월")) power = "초월";
            else if (stageName.includes("일반")) power = "일반";
            return familiarData[name]?.[power] || familiarData[name]?.["X"] || "";
          };

          const saveProject = () => {
            const defaultTitle = `제목 없는 프로젝트 ${projects.length + 1}`;
            const title = window.prompt('임시저장할 프로젝트 제목을 입력하세요.', defaultTitle);
            if (title) {
              setProjects([{ id: Date.now().toString(), title, date: new Date().toLocaleDateString(), totalEggs, trackers }, ...projects]);
              alert('임시 저장되었습니다.');
            }
          };

          const confirmAwakening = () => {
            if (trackers.length === 0) return;
            if (window.confirm('이대로 진행하겠습니까?\n목표 단계가 My 이마젠 정보에 최종 반영됩니다.')) {
              const updated = { ...myFamiliars };
              trackers.forEach(t => { updated[t.name] = t.targetStage; });
              setMyFamiliars(updated);
              setTrackers(trackers.map(t => ({ ...t, baseStage: t.targetStage })));
              // 수정: 확정 시 남은 알의 개수를 전체 알 개수에 반영
              setTotalEggs(remainingEggs);
              alert('My 이마젠에 반영되었습니다.');
            }
          };

          const handleStageSelect = (stageIdx) => {
             setMyFamiliars(prev => ({...prev, [selectedFamiliarForStage]: stageIdx}));
             setSelectedFamiliarForStage(null);
          };

          if (loading) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-white dark:bg-black transition-colors">
                <Loader2 className="animate-spin w-8 h-8 text-black dark:text-white mb-4" />
                <p className="text-gray-900 dark:text-gray-100 font-bold text-sm">로딩 중...</p>
              </div>
            );
          }

          if (error) {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-white dark:bg-black transition-colors text-center space-y-4">
                <div className="text-red-500"><X className="w-8 h-8"/></div>
                <p className="text-black dark:text-white font-bold">{error}</p>
                <button onClick={() => window.location.reload()} className="px-6 py-2 bg-black dark:bg-white text-white dark:text-black rounded font-bold">새로고침</button>
              </div>
            );
          }

          return (
            <div className="max-w-md mx-auto min-h-screen bg-white dark:bg-black pb-24 text-black dark:text-white">
              
              {/* 상단바: */}
              <div className="sticky top-0 z-40 bg-white/95 dark:bg-black/95 backdrop-blur-sm border-b border-gray-200 dark:border-zinc-800 px-5 py-3 flex justify-between items-center">
                <h1 className="font-black text-lg tracking-tight">이마젠 매니저</h1>
                <button onClick={() => setDarkMode(!darkMode)} className="p-2 text-gray-800 dark:text-gray-200">
                  {darkMode ? <Sun className="w-5 h-5" /> : <Moon className="w-5 h-5" />}
                </button>
              </div>

              {activeTab === 'my' ? (
                <div className="p-4 space-y-6 animate-fadeIn">
                  <div className="bg-white dark:bg-black p-4 border border-gray-200 dark:border-zinc-800 text-center">
                    <h2 className="text-sm font-black mb-1">내 이마젠 현재 상태 입력</h2>
                  </div>

                  {Object.entries(familiarsByAttribute).map(([attr, names]) => names.length > 0 && (
                    <div key={attr} className="space-y-3 bg-white dark:bg-black p-4 border border-gray-200 dark:border-zinc-800">
                      <h3 className="font-extrabold text-sm text-gray-800 dark:text-gray-200">{attr}</h3>
                      {/* 5열 그리드*/}
                      <div className="grid grid-cols-5 gap-1">
                        {names.map(name => {
                          const currentIdx = myFamiliars[name] || 0;
                          const style = getStageStyleInfo(currentIdx);
                          return (
                            <div key={name} className="flex flex-col items-center gap-1">
                              <div className="w-full aspect-square overflow-hidden">
                                <img src={getImageUrl(name, currentIdx)} alt={name} className="w-full h-full object-cover" />
                              </div>
                              <span className="text-[10px] font-bold text-center line-clamp-1 w-full text-black dark:text-white">{name}</span>
                              <button 
                                onClick={() => setSelectedFamiliarForStage(name)}
                                className={`w-full text-xs font-black bg-gray-100 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 py-1 text-center focus:outline-none rounded-none active:scale-95 transition-transform ${style.color}`}
                              >
                                {STAGES[currentIdx]}
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div className="p-4 space-y-4 animate-fadeIn">
                  
                  {/* 대시보드 */}
                  <div className="bg-white dark:bg-black p-5 border border-gray-200 dark:border-zinc-800 space-y-4">
                    <div className="flex flex-col gap-3">
                      <div className="flex justify-between items-center bg-gray-50 dark:bg-zinc-900 px-4 py-2 border border-gray-200 dark:border-zinc-800">
                        <span className="text-xs font-bold text-gray-500 dark:text-gray-400">보유한 이마젠 알 수량</span>
                        <input type="number" min="0" value={totalEggs} onChange={(e) => setTotalEggs(parseInt(e.target.value) || 0)} className="w-20 bg-transparent border-none text-base font-black text-right focus:outline-none text-black dark:text-white" />
                      </div>
                      <div className="flex justify-between items-center px-2">
                        <span className="text-xs font-bold text-gray-500 dark:text-gray-400">남은 이마젠 알 수량</span>
                        <span className={`text-lg font-black ${remainingEggs < 0 ? 'text-red-500' : 'text-blue-500'}`}>{remainingEggs} 개</span>
                      </div>
                    </div>

                    <div className="grid grid-cols-3 gap-2 pt-4 border-t border-gray-200 dark:border-zinc-800">
                      <button onClick={() => setShowProjectsModal(true)} className="py-2.5 bg-gray-100 dark:bg-zinc-800 hover:bg-gray-200 dark:hover:bg-zinc-700 text-xs font-bold transition-all active:scale-95 text-black dark:text-white rounded">불러오기</button>
                      <button onClick={saveProject} className="py-2.5 bg-gray-100 dark:bg-zinc-800 hover:bg-gray-200 dark:hover:bg-zinc-700 text-xs font-bold transition-all flex items-center justify-center gap-1 active:scale-95 text-black dark:text-white rounded"><Save className="w-3 h-3"/>임시저장</button>
                      <button onClick={confirmAwakening} className="py-2.5 bg-black dark:bg-white text-white dark:text-black text-xs font-bold transition-all flex items-center justify-center gap-1 active:scale-95 rounded"><Check className="w-3 h-3"/>확정</button>
                    </div>
                  </div>

                  {/* 트래커 리스트 */}
                  <div className="space-y-3">
                    {trackers.map(t => {
                      const cost = calculateCost(t.baseStage, t.targetStage);
                      const currentStyle = getStageStyleInfo(t.targetStage);
                      
                      const percentage = (t.targetStage / (STAGES.length - 1)) * 100;
                      const sliderStyle = {
                        '--track-bg': `linear-gradient(to right, ${currentStyle.accent} 0%, ${currentStyle.accent} ${percentage}%, var(--tw-color-gray-200, #e5e5e5) ${percentage}%, var(--tw-color-gray-200, #e5e5e5) 100%)`,
                        '--thumb-color': currentStyle.accent
                      };

                      return (
                        <div key={t.id} className="bg-white dark:bg-black p-4 border border-gray-200 dark:border-zinc-800 flex items-center gap-4 relative">
                          
                          {/* 이미지 */}
                          <div className="flex flex-col items-center shrink-0 w-14">
                            <div className="w-14 h-14 overflow-hidden">
                              <img src={getImageUrl(t.name, t.targetStage)} alt={t.name} className="w-full h-full object-cover" />
                            </div>
                            <span className="text-[10px] font-black tracking-tight line-clamp-1 mt-1 text-black dark:text-white">{t.name}</span>
                          </div>

                          {/* 컨트롤러 */}
                          <div className="flex-1 space-y-3">
                            <div className="flex justify-between items-end text-[11px] font-bold px-1">
                              <div className="flex flex-col">
                                <span className="text-gray-500 dark:text-gray-400 font-medium">현재: {STAGES[t.baseStage]}</span>
                                <span className={`text-sm ${currentStyle.color}`}>{STAGES[t.targetStage]}</span>
                              </div>
                              <div className="text-right">
                                <span className="text-gray-500 dark:text-gray-400 font-medium block mb-0.5">비용</span>
                                <span className="text-black dark:text-white font-black text-sm">{cost}</span>
                              </div>
                            </div>
                            <input 
                              type="range" min="0" max={STAGES.length - 1} value={t.targetStage} 
                              onChange={(e) => handleSliderChange(t.id, e.target.value)}
                              style={sliderStyle}
                              className="custom-slider w-full h-1 cursor-pointer" 
                            />
                          </div>

                          <button onClick={() => setTrackers(trackers.filter(tr => tr.id !== t.id))} className="absolute top-2 right-2 p-1 text-gray-400 hover:text-red-500">
                            <Trash2 className="w-4 h-4" />
                          </button>
                        </div>
                      );
                    })}
                    
                    <button onClick={() => setShowAddModal(true)} className="w-full py-4 border border-dashed border-gray-300 dark:border-zinc-700 text-gray-500 dark:text-gray-400 font-black text-sm hover:bg-gray-50 dark:hover:bg-zinc-900 transition-all flex items-center justify-center gap-2 active:scale-98">
                      <Plus className="w-4 h-4"/> 이마젠 추가
                    </button>
                  </div>
                </div>
              )}

              {/* 하단 네비게이션 */}
              <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 dark:bg-black/95 backdrop-blur-md border-t border-gray-200 dark:border-zinc-800 flex justify-around py-3 z-40 pb-safe">
                <button onClick={() => setActiveTab('my')} className={`flex flex-col items-center gap-1 text-xs font-black transition-colors ${activeTab === 'my' ? 'text-black dark:text-white' : 'text-gray-400 dark:text-zinc-600'}`}>
                  <Sparkles className="w-5 h-5"/> My
                </button>
                <button onClick={() => setActiveTab('calc')} className={`flex flex-col items-center gap-1 text-xs font-black transition-colors ${activeTab === 'calc' ? 'text-black dark:text-white' : 'text-gray-400 dark:text-zinc-600'}`}>
                  <Sliders className="w-5 h-5"/> 계산기
                </button>
              </div>

              {/* 추가 모달 */}
              {showAddModal && (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/80 p-0">
                  <div className="bg-white dark:bg-black w-full max-w-md max-h-[85vh] flex flex-col border-t border-gray-200 dark:border-zinc-800 animate-slideUp">
                    <div className="p-4 border-b border-gray-200 dark:border-zinc-800 flex justify-between items-center sticky top-0 bg-white dark:bg-black z-10">
                      <span className="font-black text-sm text-black dark:text-white">추가할 이마젠 선택</span>
                      <button onClick={() => setShowAddModal(false)} className="p-1 text-gray-500 active:scale-90 transition-transform"><X className="w-5 h-5"/></button>
                    </div>
                    <div className="overflow-y-auto p-4 space-y-6 pb-10">
                      {Object.entries(familiarsByAttribute).map(([attr, names]) => names.length > 0 && (
                        <div key={attr} className="space-y-2">
                          <h4 className="text-xs font-black text-gray-500 uppercase tracking-wider">{attr}</h4>
                          {/* 5열 그리드, 여백 최소화 */}
                          <div className="grid grid-cols-5 gap-1">
                            {names.map(name => {
                              const isAdded = trackers.some(tr => tr.name === name);
                              return (
                                <button key={name} onClick={() => addTracker(name)} disabled={isAdded} className={`w-full aspect-square overflow-hidden transition-all ${isAdded ? 'opacity-20 grayscale' : 'active:scale-95'}`}>
                                  <img src={getImageUrl(name, myFamiliars[name] || 0)} alt={name} className="w-full h-full object-cover" />
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* 프로젝트 불러오기 모달 */}
              {showProjectsModal && (
                <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/80">
                  <div className="bg-white dark:bg-black w-full max-w-md max-h-[60vh] flex flex-col border-t border-gray-200 dark:border-zinc-800 animate-slideUp">
                    <div className="p-4 border-b border-gray-200 dark:border-zinc-800 flex justify-between items-center">
                      <span className="font-black text-sm text-black dark:text-white">임시저장 목록</span>
                      <button onClick={() => setShowProjectsModal(false)} className="p-1 text-gray-500 active:scale-90 transition-transform"><X className="w-5 h-5"/></button>
                    </div>
                    <div className="overflow-y-auto p-4 space-y-2 pb-8">
                      {projects.length === 0 ? (
                        <p className="text-center py-10 text-sm font-bold text-gray-400">저장된 기록이 없습니다.</p>
                      ) : (
                        projects.map(p => (
                          <div key={p.id} onClick={() => { setTotalEggs(p.totalEggs); setTrackers(p.trackers); setShowProjectsModal(false); }} className="p-4 bg-gray-50 dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 flex justify-between items-center cursor-pointer">
                            <div>
                              <h5 className="text-sm font-black text-black dark:text-white">{p.title}</h5>
                              <p className="text-xs font-bold text-gray-500 mt-1">{p.date} · {p.trackers.length}종</p>
                            </div>
                            <button onClick={(e) => { e.stopPropagation(); if(confirm('삭제하시겠습니까?')) setProjects(projects.filter(pr => pr.id !== p.id)); }} className="p-2 text-gray-400 hover:text-red-500">
                              <Trash2 className="w-4 h-4"/>
                            </button>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* 각성 단계 설정 모달 추가 */}
              {selectedFamiliarForStage && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4">
                  <div className="bg-white dark:bg-black w-full max-w-sm rounded-lg flex flex-col border border-gray-200 dark:border-zinc-800 animate-fadeIn">
                    <div className="p-4 border-b border-gray-200 dark:border-zinc-800 flex justify-between items-center">
                      <span className="font-black text-sm text-black dark:text-white">{selectedFamiliarForStage} 각성 단계</span>
                      <button onClick={() => setSelectedFamiliarForStage(null)} className="p-1 text-gray-500 active:scale-90 transition-transform"><X className="w-5 h-5"/></button>
                    </div>
                    <div className="p-4 space-y-2 pb-6">
                      <div className="grid grid-cols-2 gap-2 mb-3">
                          <button onClick={() => handleStageSelect(0)} className="py-2 text-xs font-bold border border-gray-200 dark:border-zinc-700 rounded text-gray-500 active:scale-95 transition-transform bg-gray-50 dark:bg-zinc-900">X</button>
                          <button onClick={() => handleStageSelect(1)} className="py-2 text-xs font-bold border border-blue-200 dark:border-blue-900 rounded text-blue-600 dark:text-blue-500 active:scale-95 transition-transform bg-blue-50 dark:bg-blue-900/20">일반 0</button>
                      </div>
                      {[
                        { label: '일반', start: 2, end: 11, colorClass: 'text-blue-600 dark:text-blue-500 border-blue-200 dark:border-blue-900 bg-blue-50 dark:bg-blue-900/10' },
                        { label: '초월', start: 12, end: 21, colorClass: 'text-purple-600 dark:text-purple-500 border-purple-200 dark:border-purple-900 bg-purple-50 dark:bg-purple-900/10' },
                        { label: '초극', start: 22, end: 31, colorClass: 'text-red-600 dark:text-red-500 border-red-200 dark:border-red-900 bg-red-50 dark:bg-red-900/10' }
                      ].map(group => (
                        <div key={group.label} className="space-y-1">
                          <div className="grid grid-cols-5 gap-1">
                             {STAGES.slice(group.start, group.start + 5).map((s, i) => (
                                <button key={s} onClick={() => handleStageSelect(group.start + i)} className={`py-1.5 text-[10px] font-bold border rounded ${group.colorClass} truncate active:scale-95 transition-transform`}>{s}</button>
                             ))}
                          </div>
                          <div className="grid grid-cols-5 gap-1">
                             {STAGES.slice(group.start + 5, group.end + 1).map((s, i) => (
                                <button key={s} onClick={() => handleStageSelect(group.start + 5 + i)} className={`py-1.5 text-[10px] font-bold border rounded ${group.colorClass} truncate active:scale-95 transition-transform`}>{s}</button>
                             ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
